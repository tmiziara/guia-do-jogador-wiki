site_url: https://tmiziara.github.io/guia-do-jogador-wiki/
repo_url: https://github.com/tmiziara/guia-do-jogador-wiki
repo_name: tmiziara/guia-do-jogador-wiki

theme:
  name: material
  language: pt-BR
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false

